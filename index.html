<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Droyz Companion – Descarga la app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:   #57c4f2;
      --brand-dim: rgba(87, 196, 242, 0.12);
      --bg:      #080b0e;
      --surface: #0f1419;
      --border:  rgba(87, 196, 242, 0.18);
      --text:    #f0f4f8;
      --muted:   #64748b;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background glow ── */
    body::before {
      content: "";
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse, rgba(87,196,242,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px 36px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(87,196,242,0.05),
        0 32px 64px rgba(0,0,0,0.5),
        0 0 80px rgba(87,196,242,0.04);
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo-wrap svg {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 0 20px rgba(87,196,242,0.35));
    }

    /* ── Headline ── */
    .brand-name {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .brand-name span {
      color: var(--brand);
    }

    .tagline {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn:last-of-type { margin-bottom: 0; }

    .btn:active { transform: scale(0.98); }

    .btn-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg { width: 20px; height: 20px; }

    .btn-text { display: flex; flex-direction: column; align-items: flex-start; }
    .btn-text small { font-size: 10px; font-weight: 400; opacity: 0.65; letter-spacing: 0.3px; }
    .btn-text strong { font-size: 14px; font-weight: 700; }

    /* Android */
    .btn-android {
      background: rgba(61, 220, 132, 0.08);
      border: 1px solid rgba(61, 220, 132, 0.25);
    }
    .btn-android:hover {
      background: rgba(61, 220, 132, 0.14);
      box-shadow: 0 8px 24px rgba(61, 220, 132, 0.12);
      transform: translateY(-1px);
    }
    .btn-android .btn-icon {
      background: rgba(61, 220, 132, 0.15);
      color: #3ddc84;
    }

    /* iOS */
    .btn-ios {
      background: rgba(87, 196, 242, 0.08);
      border: 1px solid rgba(87, 196, 242, 0.25);
    }
    .btn-ios:hover {
      background: rgba(87, 196, 242, 0.14);
      box-shadow: 0 8px 24px rgba(87, 196, 242, 0.12);
      transform: translateY(-1px);
    }
    .btn-ios .btn-icon {
      background: rgba(87, 196, 242, 0.15);
      color: var(--brand);
    }

    /* ── Status pill ── */
    #status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 6px 14px;
      border-radius: 99px;
    }

    #status::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--brand);
      animation: pulse 1.8s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <!-- Logo -->
      <div class="logo-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
          <circle fill="#57c4f2" cx="500" cy="500" r="356"/>
          <path fill="#fff" d="M695.25,476.66c0-91.22-59.64-188.28-171.91-188.28s-187.11,83.03-187.11,204.65c0,13.81,1.22,27.57,3.61,41.03-12.2,2-22.69,6.47-29.35,14.8-29.03,36.29,58.06,145.15,130.64,159.67,72.58,14.52,232.25-23.39,232.25-87.9,0-6.74-2.66-12.83-7.21-18.38,18.72-34.01,29.09-76.75,29.09-125.59ZM464.61,470.53c-.55,4.92-1.4,10.03-2.63,15.25-7.01,29.98-22.75,51.93-35.16,49.03-12.4-2.9-16.78-29.56-9.76-59.53,7.01-29.98,22.75-51.93,35.16-49.03,7.49,1.75,12.03,12.2,12.92,26.78-9.69,5.63-20.69,14.88-26.05,29.38,0,0,12.68-7.86,25.52-11.87ZM571.34,492.85c-.55,4.92-1.4,10.03-2.63,15.25-7.01,29.98-22.75,51.93-35.16,49.03-12.4-2.9-16.78-29.56-9.76-59.53,7.01-29.98,22.75-51.93,35.16-49.03,7.49,1.75,12.03,12.2,12.92,26.78-9.69,5.63-20.69,14.88-26.05,29.38,0,0,12.68-7.86,25.52-11.87Z"/>
        </svg>
      </div>

      <!-- Headline -->
      <div class="brand-name">Droyz <span>Companion</span></div>
      <p class="tagline">Da vida a tus figuras coleccionables.<br/>Descubre sus gemelos digitales.</p>

      <!-- Divider -->
      <div class="divider"><span>Descarga la app</span></div>

      <!-- Buttons -->
      <a class="btn btn-android" id="btn-android"
         href="https://play.google.com/store/apps/details?id=com.droyztoys&hl=es">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3.18 23.76a2 2 0 0 0 2.73.74l9.72-5.62-2.93-2.93-9.52 7.81zm16.45-10.4L16.9 11.7 13.6 15l3.5 3.5 2.54-1.47a1.99 1.99 0 0 0-.01-3.67zM.92 1.24A2 2 0 0 0 .5 2.5v19a2 2 0 0 0 .42 1.26l.07.07L11.5 12 1 1.17l-.08.07zm11.86 9.48L4.01.24A2 2 0 0 0 2.9.01L13.61 10.7l-.83 1z"/>
          </svg>
        </div>
        <div class="btn-text">
          <small>Disponible en</small>
          <strong>Google Play</strong>
        </div>
      </a>

      <a class="btn btn-ios" id="btn-ios"
         href="https://apps.apple.com/es/app/droyz-companion/id6747601588">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
        </div>
        <div class="btn-text">
          <small>Disponible en</small>
          <strong>App Store</strong>
        </div>
      </a>

      <!-- Status -->
      <div id="status">Detectando dispositivo…</div>

    </div>

    <div class="footer">© 2026 Droyz Toys · Todos los derechos reservados</div>
  </div>

  <script>
    var ua = navigator.userAgent || navigator.vendor || window.opera;

    function isIOS()     { return /iPad|iPhone|iPod/.test(ua) && !window.MSStream; }
    function isAndroid() { return /android/i.test(ua); }

    var statusEl = document.getElementById("status");

    if (isIOS()) {
      statusEl.textContent = "iOS detectado · Abriendo App Store…";
      setTimeout(function () {
        window.location.href = "https://apps.apple.com/es/app/droyz-companion/id6747601588";
      }, 1000);
    } else if (isAndroid()) {
      statusEl.textContent = "Android detectado · Abriendo Google Play…";
      setTimeout(function () {
        window.location.href = "https://play.google.com/store/apps/details?id=com.droyztoys&hl=es";
      }, 1000);
    } else {
      statusEl.textContent = "Elige tu plataforma";
    }
  </script>
</body>
</html>
